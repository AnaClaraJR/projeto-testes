<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe - Acervo Rondoniense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>  tailwind.config = {
    theme: {
      extend: {},
    }
  }
</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-zinc-950">
    <nav class="border-b border-zinc-200 bg-white sticky top-0 z-50">
        <div class="mx-auto max-w-6xl px-4 h-16 flex items-center justify-between" id="navbar"></div>
    </nav>

    <main class="mx-auto w-full max-w-6xl px-4 py-10" id="main-content">
        <div class="animate-pulse space-y-4">
            <div class="h-8 bg-zinc-100 rounded w-1/4"></div>
            <div class="aspect-video bg-zinc-100 rounded-2xl w-full"></div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        async function init() {
            renderNav();
            if (!slug) return;
            const p = await fetchPatrimonio(slug);
            const container = document.getElementById('main-content');

            if (!p) {
                container.innerHTML = `<div class="text-center py-20"><h1 class="text-4xl font-bold">404</h1><p>Não encontrado.</p></div>`;
                return;
            }

            container.innerHTML = `
                <div class="mb-6">
                    <a href="busca.html" class="inline-flex items-center gap-2 border border-zinc-200 px-3 py-1.5 rounded-md text-sm font-medium hover:bg-zinc-50">
                        <i data-lucide="arrow-left" class="h-4 w-4"></i> Voltar
                    </a>
                </div>
                <div class="grid gap-6 lg:grid-cols-5">
                    <section class="lg:col-span-3">
                        <h1 class="text-3xl font-semibold tracking-tight">${p.nome}</h1>
                        <div class="flex items-center gap-2 text-sm text-zinc-600 mt-2">
                            <i data-lucide="map-pin" class="h-4 w-4"></i>
                            <span>${p.cidade}</span>
                        </div>
                        <div class="mt-6 aspect-video rounded-2xl overflow-hidden border border-zinc-200 bg-zinc-100">
                            ${p.url_foto_principal ? `<img src="${p.url_foto_principal}" class="h-full w-full object-cover">` : `<div class="flex h-full w-full items-center justify-center text-zinc-400">Sem imagem</div>`}
                        </div>
                        <div class="mt-6">
                            <h3 class="font-semibold text-sm">Descrição histórica</h3>
                            <p class="mt-2 text-zinc-700 leading-relaxed whitespace-pre-line">${p.descricao_historica}</p>
                        </div>
                    </section>
                    <aside class="lg:col-span-2">
                        <div class="sticky top-24 border border-zinc-200 rounded-xl p-6 space-y-4">
                            <div class="text-sm font-semibold">Informações</div>
                            <div class="space-y-2 text-sm text-zinc-700">
                                <div><span class="font-medium">Categoria:</span> ${p.categoria}</div>
                                <div><span class="font-medium">Estado:</span> Rondônia</div>
                                <div><span class="font-medium">Visitação:</span> Aberta ao público</div>
                            </div>
                        </div>
                    </aside>
                </div>
            `;
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
