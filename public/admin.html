<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Acervo Rondoniense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>  tailwind.config = {
    theme: {
      extend: {},
    }
  }
</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-zinc-950">
    <nav class="border-b border-zinc-200 bg-white sticky top-0 z-50">
        <div class="mx-auto max-w-6xl px-4 h-16 flex items-center justify-between" id="navbar"></div>
    </nav>

    <main class="mx-auto w-full max-w-6xl px-4 py-10">
        <header class="mb-6">
            <h1 class="text-2xl font-semibold">Painel de Solicitações</h1>
            <p class="text-sm text-zinc-600">Aprovar publica automaticamente o patrimônio no banco SQLite.</p>
        </header>

        <div id="loading" class="text-zinc-500 py-10 text-center">Carregando sugestões...</div>
        <div class="grid gap-4" id="sugestoes-list"></div>
    </main>

    <script src="js/api.js"></script>
    <script>
        const sessao = JSON.parse(localStorage.getItem('user_sessao'));
        if (!sessao || !sessao.isAdmin) {
            window.location.href = 'index.html';
        }

        async function init() {
            renderNav();
            const res = await fetch('../api/sugestoes.php');
            const data = await res.json();
            document.getElementById('loading').remove();

            const list = document.getElementById('sugestoes-list');
            if (data.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-zinc-500 border rounded-xl border-dashed">Nenhuma sugestão enviada ainda.</div>`;
            } else {
                data.forEach(s => {
                    list.innerHTML += `
                        <div class="bg-white border border-zinc-200 rounded-xl p-6 shadow-sm">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-semibold text-lg">${s.nome}</h3>
                                <span class="text-xs font-medium uppercase px-2 py-1 rounded bg-zinc-100 text-zinc-600">${s.status}</span>
                            </div>
                            <div class="space-y-2 text-sm text-zinc-700">
                                <div><strong>Cidade:</strong> ${s.cidade}</div>
                                <div><strong>Categoria:</strong> ${s.categoria}</div>
                                <div><strong>Descrição:</strong> ${s.descricao_historica}</div>
                                <div><strong>Enviado por:</strong> ${s.usuario_sugeriu}</div>
                            </div>
                            ${s.status === 'pendente' ? `
                                <div class="flex gap-2 mt-4 pt-4 border-t border-zinc-100">
                                    <button onclick="handleAcao(${s.id}, 'aprovado')" class="inline-flex items-center gap-2 bg-zinc-900 text-white px-3 py-1.5 rounded-md text-sm font-medium hover:bg-zinc-800">
                                        <i data-lucide="check-circle-2" class="h-4 w-4"></i> Aprovar
                                    </button>
                                    <button onclick="handleAcao(${s.id}, 'rejeitado')" class="inline-flex items-center gap-2 border border-zinc-200 px-3 py-1.5 rounded-md text-sm font-medium hover:bg-rose-50 hover:text-rose-700">
                                        <i data-lucide="x-circle" class="h-4 w-4"></i> Rejeitar
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
            }
            lucide.createIcons();
        }

        async function handleAcao(id, action) {
            const res = await fetch('../api/sugestoes.php', {
                method: 'POST',
                body: JSON.stringify({ id, action })
            });
            const data = await res.json();
            if (data.ok) window.location.reload();
        }

        init();
    </script>
</body>
</html>
